# 로컬/배포 동일 접속: db, redis 서비스명으로 통일 (로컬에서도 동일 서비스 검증용)
# 로컬: env_file .env / 배포: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up 또는 .env.production 사용
services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: tryl-api:latest
    env_file:
      - ./apps/api/.env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    image: tryl-worker:latest
    env_file:
      - ./apps/worker/.env
    depends_on:
      - redis
      - db

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # 로컬: 비우면 config.ts 기본값 사용. 배포: NEXT_PUBLIC_API_BASE_URL=http://API서버IP:8000
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    image: tryl-web:latest
    env_file:
      - ./apps/web/.env
    ports:
      - "3000:3000"
    depends_on:
      - api

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tryl
      POSTGRES_USER: tryl
      POSTGRES_PASSWORD: tryl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
