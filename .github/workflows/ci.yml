name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build-web:
    name: Web — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter web lint

      - name: Build
        run: pnpm --filter web build

  build-extension:
    name: Extension — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter extension build

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: apps/extension/dist/
          retention-days: 14

  test-api:
    name: API — Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tryl_test
          POSTGRES_USER: tryl
          POSTGRES_PASSWORD: tryl
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U tryl"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Apply schema
        run: psql postgresql://tryl:tryl@localhost:5432/tryl_test -f apps/api/db/schema.sql

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://tryl:tryl@localhost:5432/tryl_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret
          STORAGE_BACKEND: local
        run: pytest
