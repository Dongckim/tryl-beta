# Web 전용 EC2에서 실행. 이미지는 미리 pull (예: ECR) 또는 아래 build로 EC2에서 직접 빌드.
# 요청 URL이 localhost:8000이 아닌 EC2 IP로 나가게 하려면, 웹 이미지를 NEXT_PUBLIC_API_BASE_URL 넣어서 빌드해야 함.
# 사용: 루트에 .env 에 NEXT_PUBLIC_API_BASE_URL=http://이서버공인IP:8000 넣고
#       빌드 후 실행: docker compose -f docker-compose.ec2-web.yml up -d --build
#       (이미지만 pull 할 경우: 먼저 로컬/CI에서 동일 URL로 빌드 후 push → EC2에서 pull)
version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    image: tryl-web:latest
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
